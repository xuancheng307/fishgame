<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生端 - 魚市場遊戲</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2em; }
        .header .info { font-size: .9em; opacity: .85; }
        .header button { background: rgba(255,255,255,.2); color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .card h2 { font-size: 1.1em; margin-bottom: 12px; color: #1e293b; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .stat { background: #f8fafc; padding: 12px; border-radius: 8px; text-align: center; }
        .stat .label { font-size: .8em; color: #64748b; }
        .stat .value { font-size: 1.2em; font-weight: 700; color: #1e293b; margin-top: 4px; }
        .phase-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .85em; font-weight: 600; }
        .phase-buying { background: #dbeafe; color: #1d4ed8; }
        .phase-selling { background: #fef3c7; color: #92400e; }
        .phase-settled { background: #d1fae5; color: #065f46; }
        .phase-waiting { background: #f1f5f9; color: #475569; }
        .timer { font-size: 1.8em; font-weight: 700; color: #dc2626; text-align: center; padding: 12px; }
        .bid-form { margin-top: 12px; }
        .bid-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
        .bid-row label { font-weight: 600; font-size: .9em; }
        .bid-row input { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: .95em; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: .95em; font-weight: 600; cursor: pointer; transition: .15s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-success { background: #16a34a; color: white; }
        .btn-join { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; width: 100%; padding: 14px; font-size: 1.1em; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: .9em; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .results-table { width: 100%; border-collapse: collapse; font-size: .9em; margin-top: 8px; white-space: nowrap; }
        .results-table th, .results-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        .results-table th { background: #f8fafc; font-weight: 600; color: #475569; }
        .name-input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1em; margin-bottom: 12px; }
        .hidden { display: none; }
        #alertBox { position: fixed; top: 16px; right: 16px; z-index: 1000; max-width: 360px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 data-i18n="st.title">魚市場遊戲</h1>
        <span class="info" id="userInfo"></span>
    </div>
    <div>
        <button id="langToggle" onclick="toggleLang()" style="background:rgba(255,255,255,.2);color:white;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;margin-right:8px;font-size:.85em;">EN</button>
        <a href="game-instructions.html" style="color:white;margin-right:12px;font-size:.9em;" data-i18n="st.instructions">遊戲說明</a>
        <button onclick="logout()" data-i18n="st.logout">登出</button>
    </div>
</div>

<div id="alertBox"></div>

<div class="container">
    <!-- 加入遊戲 -->
    <div id="joinSection" class="card hidden">
        <h2 data-i18n="st.join.title">加入遊戲</h2>
        <p style="margin-bottom:12px;color:#64748b;" data-i18n="st.join.desc">輸入你的組名，然後加入當前遊戲</p>
        <input type="text" class="name-input" id="teamNameInput" placeholder="輸入組名（選填）" data-i18n-ph="st.ph.teamName">
        <button class="btn btn-join" onclick="joinGame()" data-i18n="st.join.btn">一鍵加入遊戲</button>
    </div>

    <!-- 遊戲狀態 -->
    <div id="gameSection" class="hidden">
        <!-- 狀態概覽 -->
        <div class="card">
            <h2 data-i18n="st.status.title">遊戲狀態</h2>
            <div id="gameStatus"></div>
            <div id="timerDisplay" class="timer hidden"></div>
        </div>

        <!-- 財務狀況 -->
        <div class="card">
            <h2 data-i18n="st.finance.title">我的財務</h2>
            <div id="financials" class="stats"></div>
        </div>

        <!-- 買入投標 -->
        <div id="buySection" class="card hidden">
            <h2 data-i18n="st.buy.title">買入投標</h2>
            <div id="marketInfo" class="alert alert-info" style="margin-bottom:12px;"></div>
            <div class="bid-form">
                <p style="font-weight:600;margin-bottom:8px;" data-i18n="st.fishA">A 級魚</p>
                <div class="bid-row">
                    <label data-i18n="st.bid1">標單 1</label>
                    <input type="number" id="buyA1Price" placeholder="價格" data-i18n-ph="st.ph.price" min="0">
                    <input type="number" id="buyA1Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <div class="bid-row">
                    <label data-i18n="st.bid2">標單 2</label>
                    <input type="number" id="buyA2Price" placeholder="價格（選填）" data-i18n-ph="st.ph.priceOpt" min="0">
                    <input type="number" id="buyA2Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <p style="font-weight:600;margin:12px 0 8px;" data-i18n="st.fishB">B 級魚</p>
                <div class="bid-row">
                    <label data-i18n="st.bid1">標單 1</label>
                    <input type="number" id="buyB1Price" placeholder="價格" data-i18n-ph="st.ph.price" min="0">
                    <input type="number" id="buyB1Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <div class="bid-row">
                    <label data-i18n="st.bid2">標單 2</label>
                    <input type="number" id="buyB2Price" placeholder="價格（選填）" data-i18n-ph="st.ph.priceOpt" min="0">
                    <input type="number" id="buyB2Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <button class="btn btn-primary" onclick="submitBuyBids()" style="margin-top:12px;width:100%;" data-i18n="st.btn.buy">送出買入投標</button>
            </div>
        </div>

        <!-- 賣出投標 -->
        <div id="sellSection" class="card hidden">
            <h2 data-i18n="st.sell.title">賣出投標</h2>
            <div id="inventoryInfo" class="alert alert-info" style="margin-bottom:12px;"></div>
            <div class="bid-form">
                <p style="font-weight:600;margin-bottom:8px;" data-i18n="st.fishA">A 級魚</p>
                <div class="bid-row">
                    <label data-i18n="st.bid1">標單 1</label>
                    <input type="number" id="sellA1Price" placeholder="價格" data-i18n-ph="st.ph.price" min="0">
                    <input type="number" id="sellA1Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <div class="bid-row">
                    <label data-i18n="st.bid2">標單 2</label>
                    <input type="number" id="sellA2Price" placeholder="價格（選填）" data-i18n-ph="st.ph.priceOpt" min="0">
                    <input type="number" id="sellA2Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <p style="font-weight:600;margin:12px 0 8px;" data-i18n="st.fishB">B 級魚</p>
                <div class="bid-row">
                    <label data-i18n="st.bid1">標單 1</label>
                    <input type="number" id="sellB1Price" placeholder="價格" data-i18n-ph="st.ph.price" min="0">
                    <input type="number" id="sellB1Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <div class="bid-row">
                    <label data-i18n="st.bid2">標單 2</label>
                    <input type="number" id="sellB2Price" placeholder="價格（選填）" data-i18n-ph="st.ph.priceOpt" min="0">
                    <input type="number" id="sellB2Qty" placeholder="數量 (kg)" data-i18n-ph="st.ph.qty" min="0">
                </div>
                <button class="btn btn-success" onclick="submitSellBids()" style="margin-top:12px;width:100%;" data-i18n="st.btn.sell">送出賣出投標</button>
            </div>
        </div>

        <!-- 投標紀錄 -->
        <div class="card" id="myBidsCard" style="display:none;">
            <h2 data-i18n="st.bids.title">投標紀錄</h2>
            <div id="myBidsContent"></div>
        </div>

        <!-- 歷史結果 -->
        <div class="card">
            <h2 data-i18n="st.results.title">每日結果</h2>
            <div id="dailyResults"><p style="color:#94a3b8;" data-i18n="st.results.empty">尚無結算資料</p></div>
        </div>
    </div>
</div>

<script src="i18n.js"></script>
<script>
const API = '/api';
const token = localStorage.getItem('token');
const username = localStorage.getItem('username');

if (!token) { window.location.href = 'login.html'; }

document.getElementById('userInfo').textContent = `組別: ${username}`;

const socket = io({ auth: { token } });
let dashboardData = null;

// --- Socket events ---
socket.on('phaseChange', () => refreshDashboard());
socket.on('gameUpdate', () => refreshDashboard());
socket.on('buyingResults', () => refreshDashboard());
socket.on('sellingResults', () => refreshDashboard());
socket.on('timer', (data) => {
    const timerEl = document.getElementById('timerDisplay');
    if (data.remaining > 0) {
        const min = Math.floor(data.remaining / 60);
        const sec = data.remaining % 60;
        timerEl.textContent = `⏱ ${min}:${String(sec).padStart(2, '0')}`;
        timerEl.classList.remove('hidden');
    } else {
        timerEl.classList.add('hidden');
        refreshDashboard();
    }
});

// --- API helpers ---
async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '請求失敗');
    return data;
}

function showAlert(msg, type = 'info') {
    const box = document.getElementById('alertBox');
    const el = document.createElement('div');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    box.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

function fmt(n) { return Number(n || 0).toLocaleString('zh-TW', { maximumFractionDigits: 0 }); }
function bidStatusText(s) {
    const isEn = localStorage.getItem('i18n_lang') === 'en';
    const map = isEn
        ? { pending: 'Pending', fulfilled: 'Filled', partial: 'Partial', unfulfilled: 'Unfilled' }
        : { pending: '待結算', fulfilled: '完全成交', partial: '部分成交', unfulfilled: '未成交' };
    return map[s] || s;
}

// --- Main flow ---
async function refreshDashboard() {
    try {
        dashboardData = await apiFetch(`${API}/team/dashboard`);
        document.getElementById('joinSection').classList.add('hidden');
        document.getElementById('gameSection').classList.remove('hidden');
        renderDashboard(dashboardData);
    } catch (err) {
        if (err.message.includes('尚未加入') || err.message.includes('沒有進行中')) {
            document.getElementById('joinSection').classList.remove('hidden');
            document.getElementById('gameSection').classList.add('hidden');
        } else {
            showAlert(err.message, 'error');
        }
    }
}

function renderDashboard(data) {
    const gi = data.gameInfo;
    const fi = data.financials;
    const phase = gi.dayStatus;

    // Phase mapping for display
    const phaseNames = {
        'pending': '等待中', 'buying_open': '買入投標中', 'buying_closed': '買入結算完成',
        'selling_open': '賣出投標中', 'selling_closed': '賣出結算完成', 'settled': '每日結算完成'
    };
    const phaseClass = phase.includes('buy') ? 'buying' : phase.includes('sell') ? 'selling' : phase === 'settled' ? 'settled' : 'waiting';

    document.getElementById('gameStatus').innerHTML = `
        <div class="stats">
            <div class="stat"><div class="label" data-i18n="st.label.game">遊戲</div><div class="value">${gi.gameName || '進行中'}</div></div>
            <div class="stat"><div class="label" data-i18n="st.label.day">目前天數</div><div class="value" data-i18n="st.dayN" data-val-n="${gi.currentDay}">第 ${gi.currentDay} 天</div></div>
            <div class="stat"><div class="label" data-i18n="st.label.phase">階段</div><div class="value"><span class="phase-badge phase-${phaseClass}" data-i18n="st.phase.${phase}">${phaseNames[phase] || phase}</span></div></div>
        </div>
    `;

    document.getElementById('financials').innerHTML = `
        <div class="stat"><div class="label" data-i18n="st.label.cash">現金</div><div class="value">$${fmt(fi.currentBudget)}</div></div>
        <div class="stat"><div class="label" data-i18n="st.label.loan">借貸</div><div class="value">$${fmt(fi.totalLoan)}</div></div>
        <div class="stat"><div class="label" data-i18n="st.label.invA">A 級魚庫存</div><div class="value">${fi.fishAInventory || 0} kg</div></div>
        <div class="stat"><div class="label" data-i18n="st.label.invB">B 級魚庫存</div><div class="value">${fi.fishBInventory || 0} kg</div></div>
    `;

    // Show/hide bid sections based on phase
    const buySection = document.getElementById('buySection');
    const sellSection = document.getElementById('sellSection');
    buySection.classList.toggle('hidden', phase !== 'buying_open');
    sellSection.classList.toggle('hidden', phase !== 'selling_open');

    // Market info for buying
    if (phase === 'buying_open' && data.marketInfo) {
        const cd = data.marketInfo;
        document.getElementById('marketInfo').innerHTML =
            `<span data-i18n="st.supply" data-val-a="${cd.fishASupply || 0}" data-val-b="${cd.fishBSupply || 0}">今日供應：A 級 <b>${cd.fishASupply || 0} kg</b>、B 級 <b>${cd.fishBSupply || 0} kg</b></span><br>` +
            `<span data-i18n="st.budget" data-val-a="${fmt(cd.fishABudget)}" data-val-b="${fmt(cd.fishBBudget)}">餐廳預算：A 級 <b>$${fmt(cd.fishABudget)}</b>、B 級 <b>$${fmt(cd.fishBBudget)}</b></span><br>` +
            `<span data-i18n="st.yourCash" data-val-a="${fmt(fi.currentBudget)}">你的現金：<b>$${fmt(fi.currentBudget)}</b></span>`;
    }

    // Inventory info for selling
    if (phase === 'selling_open') {
        document.getElementById('inventoryInfo').innerHTML =
            `<span data-i18n="st.inventory" data-val-a="${fi.fishAInventory || 0}" data-val-b="${fi.fishBInventory || 0}">你的庫存：A 級 <b>${fi.fishAInventory || 0} kg</b>、B 級 <b>${fi.fishBInventory || 0} kg</b></span>`;
    }

    // Bid history (all days)
    const bidsCard = document.getElementById('myBidsCard');
    if (data.myBids && data.myBids.length > 0) {
        bidsCard.style.display = '';
        // Group by day
        const byDay = {};
        for (const b of data.myBids) {
            const d = b.day_number;
            if (!byDay[d]) byDay[d] = [];
            byDay[d].push(b);
        }
        const isEn = localStorage.getItem('i18n_lang') === 'en';
        let bhtml = '';
        // Sort days descending (newest first)
        const days = Object.keys(byDay).map(Number).sort((a, b) => b - a);
        for (const day of days) {
            const dayBids = byDay[day];
            const buyBids = dayBids.filter(b => b.bid_type === 'buy');
            const sellBids = dayBids.filter(b => b.bid_type === 'sell');
            bhtml += `<h3 style="font-size:1em;margin:${day === days[0] ? '0' : '16px'} 0 8px;color:#1e293b;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">${isEn ? 'Day ' + day : '第 ' + day + ' 天'}</h3>`;
            if (buyBids.length > 0) {
                bhtml += `<h4 style="font-size:.9em;margin-bottom:4px;color:#1d4ed8;" data-i18n="st.bids.buy">買入投標</h4>`;
                bhtml += '<div class="table-scroll"><table class="results-table"><tr><th data-i18n="st.bids.fish">魚種</th><th data-i18n="st.bids.price">出價</th><th data-i18n="st.bids.qty">數量</th><th data-i18n="st.bids.filled">成交</th><th data-i18n="st.bids.status">狀態</th></tr>';
                for (const b of buyBids) {
                    const filled = b.quantity_fulfilled != null ? b.quantity_fulfilled : '-';
                    bhtml += `<tr><td>${b.fish_type}</td><td>$${fmt(b.price)}</td><td>${b.quantity_submitted} kg</td><td>${filled === '-' ? '-' : filled + ' kg'}</td><td>${bidStatusText(b.status)}</td></tr>`;
                }
                bhtml += '</table></div>';
            }
            if (sellBids.length > 0) {
                bhtml += `<h4 style="font-size:.9em;margin:8px 0 4px;color:#92400e;" data-i18n="st.bids.sell">賣出投標</h4>`;
                bhtml += '<div class="table-scroll"><table class="results-table"><tr><th data-i18n="st.bids.fish">魚種</th><th data-i18n="st.bids.price">出價</th><th data-i18n="st.bids.qty">數量</th><th data-i18n="st.bids.filled">成交</th><th data-i18n="st.bids.status">狀態</th></tr>';
                for (const b of sellBids) {
                    const filled = b.quantity_fulfilled != null ? b.quantity_fulfilled : '-';
                    bhtml += `<tr><td>${b.fish_type}</td><td>$${fmt(b.price)}</td><td>${b.quantity_submitted} kg</td><td>${filled === '-' ? '-' : filled + ' kg'}</td><td>${bidStatusText(b.status)}</td></tr>`;
                }
                bhtml += '</table></div>';
            }
        }
        document.getElementById('myBidsContent').innerHTML = bhtml;
    } else {
        bidsCard.style.display = 'none';
    }

    // Daily results
    if (data.history && data.history.length > 0) {
        let html = '<div class="table-scroll"><table class="results-table"><tr><th data-i18n="st.th.day">天</th><th data-i18n="st.th.revenue">收入</th><th data-i18n="st.th.cost">成本</th><th data-i18n="st.th.unsold">滯銷費</th><th data-i18n="st.th.interest">利息</th><th data-i18n="st.th.daily">日利潤</th><th data-i18n="st.th.cum">累積利潤</th><th data-i18n="st.th.roi">ROI</th></tr>';
        for (const r of data.history) {
            html += `<tr>
                <td>${r.day_number}</td>
                <td>$${fmt(r.revenue)}</td>
                <td>$${fmt(r.cost)}</td>
                <td>$${fmt(r.unsold_fee)}</td>
                <td>$${fmt(r.interest_incurred)}</td>
                <td style="color:${Number(r.daily_profit) >= 0 ? '#16a34a' : '#dc2626'}">$${fmt(r.daily_profit)}</td>
                <td>$${fmt(r.cumulative_profit)}</td>
                <td>${Number(r.roi).toFixed(1)}%</td>
            </tr>`;
        }
        html += '</table></div>';
        document.getElementById('dailyResults').innerHTML = html;
    }
    if (window.applyI18n) window.applyI18n();
}

async function joinGame() {
    try {
        const teamName = document.getElementById('teamNameInput').value.trim();
        await apiFetch(`${API}/team/join-current`, {
            method: 'POST', body: JSON.stringify({ teamName: teamName || undefined })
        });
        showAlert('成功加入遊戲！', 'success');
        refreshDashboard();
    } catch (err) {
        showAlert(err.message, 'error');
    }
}

function collectBids(prefix, type) {
    const bids = [];
    for (const fish of ['A', 'B']) {
        for (const idx of ['1', '2']) {
            const price = Number(document.getElementById(`${prefix}${fish}${idx}Price`).value);
            const qty = Number(document.getElementById(`${prefix}${fish}${idx}Qty`).value);
            if (price > 0 && qty > 0) {
                bids.push({ fishType: fish, price, quantity: qty });
            }
        }
    }
    return bids;
}

async function submitBuyBids() {
    const bids = collectBids('buy', 'buy');
    if (bids.length === 0) { showAlert('請至少填寫一筆投標', 'error'); return; }
    try {
        const result = await apiFetch(`${API}/team/submit-buy-bids`, {
            method: 'POST', body: JSON.stringify({ buyBids: bids })
        });
        showAlert(`買入投標已送出（${result.summary?.bidsSubmitted || bids.length} 筆）`, 'success');
        refreshDashboard();
    } catch (err) {
        showAlert(err.message, 'error');
    }
}

async function submitSellBids() {
    const bids = collectBids('sell', 'sell');
    if (bids.length === 0) { showAlert('請至少填寫一筆投標', 'error'); return; }
    try {
        await apiFetch(`${API}/team/submit-sell-bids`, {
            method: 'POST', body: JSON.stringify({ sellBids: bids })
        });
        showAlert(`賣出投標已送出（${bids.length} 筆）`, 'success');
        refreshDashboard();
    } catch (err) {
        showAlert(err.message, 'error');
    }
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
}

// Initial load
refreshDashboard();
</script>
</body>
</html>
